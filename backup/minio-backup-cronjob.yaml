apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-backup-pvc
  namespace: backup
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 20Gi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: minio-backup
  namespace: backup
spec:
  schedule: "30 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: mc
              image: minio/mc:RELEASE.2024-10-08T09-37-26Z
              imagePullPolicy: IfNotPresent
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              env:
                - name: MINIO_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: minio-secret
                      key: MINIO_ENDPOINT
                - name: MINIO_ROOT_USER
                  valueFrom:
                    secretKeyRef:
                      name: minio-secret
                      key: MINIO_ROOT_USER
                - name: MINIO_ROOT_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: minio-secret
                      key: MINIO_ROOT_PASSWORD
              command:
                - /bin/sh
                - -c
                - |
                  set -eu
                  TS=$(date -u +%Y%m%dT%H%M%SZ)
                  mc alias set src "http://${MINIO_ENDPOINT}" "${MINIO_ROOT_USER}" "${MINIO_ROOT_PASSWORD}"
                  mkdir -p "/backup/${TS}"
                  mc mirror --overwrite --remove src/ "/backup/${TS}"
                  find /backup -maxdepth 1 -mindepth 1 -type d -mtime +14 -exec rm -rf {} +
              volumeMounts:
                - name: backup
                  mountPath: /backup
                - name: mc-config
                  mountPath: /.mc
                - name: tmp
                  mountPath: /tmp
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
          volumes:
            - name: backup
              persistentVolumeClaim:
                claimName: minio-backup-pvc
            - name: mc-config
              emptyDir: {}
            - name: tmp
              emptyDir: {}
