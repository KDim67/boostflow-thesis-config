apiVersion: v1
kind: ConfigMap
metadata:
  name: falco-custom-rules
  namespace: security
  labels:
    app.kubernetes.io/name: falco
    app.kubernetes.io/component: runtime-security
    app.kubernetes.io/part-of: boostflow
data:
  boostflow-rules.yaml: |
    - rule: Unexpected process in boostflow container
      desc: Detect any process spawned in the boostflow app container that is not node
      condition: >
        spawned_process and
        container and
        k8s.ns.name = "boostflow" and
        k8s.pod.label[app.kubernetes.io/name] = "boostflow" and
        not proc.name in (node)
      output: >
        Unexpected process in boostflow container
        (user=%user.name command=%proc.cmdline pid=%proc.pid container=%container.id
        k8s.pod=%k8s.pod.name k8s.ns=%k8s.ns.name image=%container.image.repository)
      priority: WARNING
      tags: [boostflow, process]

    - rule: Write to application directory in boostflow
      desc: Detect file writes to the /app directory (readOnlyRootFilesystem bypass attempt)
      condition: >
        open_write and
        container and
        k8s.ns.name = "boostflow" and
        fd.directory startswith /app and
        not fd.directory startswith /app/.next/cache and
        not fd.name startswith /tmp
      output: >
        Write attempt to application directory
        (user=%user.name command=%proc.cmdline file=%fd.name container=%container.id
        k8s.pod=%k8s.pod.name k8s.ns=%k8s.ns.name)
      priority: ERROR
      tags: [boostflow, filesystem]

    - rule: Unexpected network connection from MinIO
      desc: Detect MinIO container making outbound connections to non-cluster IPs
      condition: >
        outbound and
        container and
        k8s.ns.name = "boostflow" and
        k8s.pod.label[app.kubernetes.io/name] = "minio"
      output: >
        Unexpected outbound connection from MinIO
        (user=%user.name command=%proc.cmdline connection=%fd.name container=%container.id
        k8s.pod=%k8s.pod.name dest=%fd.sip)
      priority: WARNING
      tags: [boostflow, network]

    - rule: Shell spawned in production container
      desc: Detect interactive shell in any boostflow namespace container
      condition: >
        spawned_process and
        container and
        k8s.ns.name = "boostflow" and
        proc.name in (bash, sh, dash, zsh, csh, ksh, fish)
      output: >
        Shell spawned in production container
        (user=%user.name shell=%proc.name parent=%proc.pname container=%container.id
        k8s.pod=%k8s.pod.name k8s.ns=%k8s.ns.name image=%container.image.repository)
      priority: CRITICAL
      tags: [boostflow, shell]

    - rule: Privilege escalation attempt
      desc: Detect setuid/setgid calls in boostflow namespace
      condition: >
        container and
        k8s.ns.name = "boostflow" and
        evt.type in (setuid, setgid) and
        evt.dir = <
      output: >
        Privilege escalation attempt detected
        (user=%user.name command=%proc.cmdline uid=%user.uid container=%container.id
        k8s.pod=%k8s.pod.name k8s.ns=%k8s.ns.name)
      priority: CRITICAL
      tags: [boostflow, privilege_escalation]

    - rule: Sensitive file access in container
      desc: Detect access to sensitive files like /etc/shadow or /etc/passwd
      condition: >
        open_read and
        container and
        k8s.ns.name = "boostflow" and
        fd.name in (/etc/shadow, /etc/passwd, /etc/sudoers)
      output: >
        Sensitive file accessed in container
        (user=%user.name command=%proc.cmdline file=%fd.name container=%container.id
        k8s.pod=%k8s.pod.name k8s.ns=%k8s.ns.name)
      priority: ERROR
      tags: [boostflow, filesystem, sensitive_files]
