apiVersion: v1
kind: Service
metadata:
  name: boostflow-app
  namespace: boostflow
  labels:
    app.kubernetes.io/name: boostflow
    app.kubernetes.io/component: app
    app.kubernetes.io/part-of: boostflow
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: boostflow
    app.kubernetes.io/component: app
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
