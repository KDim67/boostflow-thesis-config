apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: boostflow-runtime-firebase-admin
  namespace: boostflow
spec:
  type: kv-v2
  mount: secret
  path: boostflow/runtime/firebase-admin
  refreshAfter: 1h
  vaultAuthRef: boostflow-auth
  destination:
    name: boostflow-firebase-admin-secret
    create: true
    overwrite: true
    transformation:
      excludeRaw: true
      excludes:
        - .*
      templates:
        FIREBASE_SERVICE_ACCOUNT_KEY:
          text: '{{ .Secrets.service_account_key }}'
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: boostflow-runtime-oauth
  namespace: boostflow
spec:
  type: kv-v2
  mount: secret
  path: boostflow/runtime/oauth
  refreshAfter: 1h
  vaultAuthRef: boostflow-auth
  destination:
    name: boostflow-oauth-secret
    create: true
    overwrite: true
    transformation:
      excludeRaw: true
      excludes:
        - .*
      templates:
        GOOGLE_CLIENT_ID: { text: '{{ .Secrets.google_client_id }}' }
        GOOGLE_CLIENT_SECRET: { text: '{{ .Secrets.google_client_secret }}' }
        GITHUB_CLIENT_ID: { text: '{{ .Secrets.github_client_id }}' }
        GITHUB_CLIENT_SECRET: { text: '{{ .Secrets.github_client_secret }}' }
---
apiVersion: secrets.hashicorp.com/v1beta1
