apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: boostflow
data:
  boostflow-overview.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {"type": "datasource", "uid": "-- Grafana --"},
            "enable": true,
            "hide": true,
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "description": "DevSecOps platform monitoring — service health, resources, and log analytics.",
      "editable": true,
      "graphTooltip": 1,
      "panels": [
        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 0},
          "id": 100,
          "title": "Service Health",
          "type": "row"
        },
        {
          "id": 1,
          "type": "stat",
          "title": "Application",
          "description": "BoostFlow Next.js app liveness",
          "gridPos": {"h": 5, "w": 5, "x": 0, "y": 1},
          "datasource": {"type": "prometheus", "uid": "Prometheus"},
          "targets": [{"expr": "up{job=\"boostflow-app\"} == 1", "instant": true, "refId": "A"}],
          "fieldConfig": {
            "defaults": {
              "mappings": [{"type": "value", "options": {"0": {"text": "DOWN", "color": "dark-red", "index": 0}, "1": {"text": "UP", "color": "dark-green", "index": 1}}}],
              "thresholds": {"mode": "absolute", "steps": [{"color": "dark-red", "value": null}, {"color": "dark-green", "value": 1}]},
              "color": {"mode": "thresholds"},
              "noValue": "N/A"
            }
          },
          "options": {"colorMode": "background_solid", "graphMode": "none", "textMode": "value", "justifyMode": "center", "reduceOptions": {"calcs": ["lastNotNull"]}}
        },
        {
          "id": 2,
          "type": "stat",
          "title": "MinIO Storage",
          "description": "MinIO object storage liveness",
          "gridPos": {"h": 5, "w": 5, "x": 5, "y": 1},
          "datasource": {"type": "prometheus", "uid": "Prometheus"},
          "targets": [{"expr": "up{job=\"minio\"} == 1", "instant": true, "refId": "A"}],
          "fieldConfig": {
            "defaults": {
              "mappings": [{"type": "value", "options": {"0": {"text": "DOWN", "color": "dark-red", "index": 0}, "1": {"text": "UP", "color": "dark-green", "index": 1}}}],
              "thresholds": {"mode": "absolute", "steps": [{"color": "dark-red", "value": null}, {"color": "dark-green", "value": 1}]},
              "color": {"mode": "thresholds"},
              "noValue": "N/A"
            }
          },
          "options": {"colorMode": "background_solid", "graphMode": "none", "textMode": "value", "justifyMode": "center", "reduceOptions": {"calcs": ["lastNotNull"]}}
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Kubernetes Node",
          "description": "Kubelet node health",
          "gridPos": {"h": 5, "w": 5, "x": 10, "y": 1},
          "datasource": {"type": "prometheus", "uid": "Prometheus"},
          "targets": [{"expr": "up{job=\"kubernetes-nodes\"} == 1", "instant": true, "legendFormat": "{{kubernetes_io_hostname}}", "refId": "A"}],
          "fieldConfig": {
            "defaults": {
              "mappings": [{"type": "value", "options": {"0": {"text": "DOWN", "color": "dark-red", "index": 0}, "1": {"text": "UP", "color": "dark-green", "index": 1}}}],
              "thresholds": {"mode": "absolute", "steps": [{"color": "dark-red", "value": null}, {"color": "dark-green", "value": 1}]},
              "color": {"mode": "thresholds"},
              "noValue": "N/A"
            }
          },
          "options": {"colorMode": "background_solid", "graphMode": "none", "textMode": "value", "justifyMode": "center", "reduceOptions": {"calcs": ["lastNotNull"]}}
        },
        {
          "id": 4,
          "type": "stat",
          "title": "App Uptime",
          "description": "Next.js process uptime from /api/metrics",
          "gridPos": {"h": 5, "w": 5, "x": 15, "y": 1},
          "datasource": {"type": "prometheus", "uid": "Prometheus"},
          "targets": [{"expr": "process_uptime_seconds{job=\"boostflow-app\"} and up{job=\"boostflow-app\"} == 1", "instant": true, "refId": "A"}],
          "fieldConfig": {
            "defaults": {
              "thresholds": {"mode": "absolute", "steps": [{"color": "orange", "value": null}, {"color": "dark-green", "value": 3600}]},
              "color": {"mode": "thresholds"},
              "unit": "s",
              "noValue": "N/A"
            }
          },
          "options": {"colorMode": "background_solid", "graphMode": "area", "textMode": "value", "justifyMode": "center", "reduceOptions": {"calcs": ["lastNotNull"]}}
        },
        {
          "id": 5,
          "type": "stat",
          "title": "Targets UP",
          "description": "Total healthy Prometheus scrape targets",
          "gridPos": {"h": 5, "w": 4, "x": 20, "y": 1},
          "datasource": {"type": "prometheus", "uid": "Prometheus"},
          "targets": [{"expr": "count(up == 1)", "refId": "A"}],
          "fieldConfig": {
            "defaults": {
              "thresholds": {"mode": "absolute", "steps": [{"color": "dark-red", "value": null}, {"color": "dark-yellow", "value": 1}, {"color": "dark-green", "value": 3}]},
              "color": {"mode": "thresholds"},
              "noValue": "0"
            }
          },
          "options": {"colorMode": "background_solid", "graphMode": "area", "textMode": "value", "justifyMode": "center", "reduceOptions": {"calcs": ["lastNotNull"]}}
        },
        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 6},
          "id": 101,
          "title": "Cluster Resources",
          "type": "row"
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "CPU Usage by Namespace",
          "description": "cAdvisor CPU consumption, stacked by namespace",
          "gridPos": {"h": 9, "w": 12, "x": 0, "y": 7},
          "datasource": {"type": "prometheus", "uid": "Prometheus"},
          "targets": [{"expr": "sum(rate(container_cpu_usage_seconds_total{container!=\"POD\", container!=\"\", image!=\"\"}[5m])) by (namespace)", "legendFormat": "{{namespace}}", "refId": "A"}],
          "fieldConfig": {
            "defaults": {
              "custom": {"lineInterpolation": "smooth", "lineWidth": 2, "fillOpacity": 30, "gradientMode": "opacity", "stacking": {"mode": "normal", "group": "A"}, "showPoints": "never"},
              "unit": "short",
              "min": 0
            }
          },
          "options": {
            "tooltip": {"mode": "multi", "sort": "desc"},
            "legend": {"displayMode": "table", "placement": "bottom", "calcs": ["mean", "max", "lastNotNull"]}
          }
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "Memory Usage by Namespace",
          "description": "Working set memory from cAdvisor, stacked by namespace",
          "gridPos": {"h": 9, "w": 12, "x": 12, "y": 7},
          "datasource": {"type": "prometheus", "uid": "Prometheus"},
          "targets": [{"expr": "sum(container_memory_working_set_bytes{container!=\"POD\", container!=\"\", image!=\"\"}) by (namespace)", "legendFormat": "{{namespace}}", "refId": "A"}],
          "fieldConfig": {
            "defaults": {
              "custom": {"lineInterpolation": "smooth", "lineWidth": 2, "fillOpacity": 30, "gradientMode": "opacity", "stacking": {"mode": "normal", "group": "A"}, "showPoints": "never"},
              "unit": "decbytes",
              "min": 0
            }
          },
          "options": {
            "tooltip": {"mode": "multi", "sort": "desc"},
            "legend": {"displayMode": "table", "placement": "bottom", "calcs": ["mean", "max", "lastNotNull"]}
          }
        },
        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 16},
          "id": 102,
          "title": "Application & Storage",
          "type": "row"
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "App Heap Memory",
          "description": "V8 heap used vs total — shows memory pressure and potential leaks",
          "gridPos": {"h": 9, "w": 12, "x": 0, "y": 17},
          "datasource": {"type": "prometheus", "uid": "Prometheus"},
          "targets": [
            {"expr": "process_memory_heap_used_bytes{job=\"boostflow-app\"}", "legendFormat": "Heap Used", "refId": "A"},
            {"expr": "process_memory_heap_total_bytes{job=\"boostflow-app\"}", "legendFormat": "Heap Total", "refId": "B"}
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {"lineInterpolation": "smooth", "lineWidth": 2, "fillOpacity": 10, "gradientMode": "opacity", "showPoints": "never"},
              "unit": "decbytes",
              "min": 0
            },
            "overrides": [
              {"matcher": {"id": "byName", "options": "Heap Total"}, "properties": [{"id": "custom.lineStyle", "value": {"fill": "dash", "dash": [10, 10]}}, {"id": "custom.fillOpacity", "value": 0}]}
            ]
          },
          "options": {
            "tooltip": {"mode": "multi", "sort": "desc"},
            "legend": {"displayMode": "table", "placement": "bottom", "calcs": ["mean", "max", "lastNotNull"]}
          }
        },
        {
          "id": 9,
          "type": "timeseries",
          "title": "MinIO S3 Traffic Rate",
          "description": "S3-level throughput — uploads vs downloads per second",
          "gridPos": {"h": 9, "w": 12, "x": 12, "y": 17},
          "datasource": {"type": "prometheus", "uid": "Prometheus"},
          "targets": [
            {"expr": "rate(minio_s3_traffic_sent_bytes[5m])", "legendFormat": "Downloads (Sent)", "refId": "A"},
            {"expr": "rate(minio_s3_traffic_received_bytes[5m])", "legendFormat": "Uploads (Received)", "refId": "B"}
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {"lineInterpolation": "smooth", "lineWidth": 2, "fillOpacity": 15, "gradientMode": "opacity", "showPoints": "never"},
              "unit": "Bps",
              "min": 0
            },
            "overrides": [
              {"matcher": {"id": "byName", "options": "Downloads (Sent)"}, "properties": [{"id": "color", "value": {"fixedColor": "super-light-green", "mode": "fixed"}}]},
              {"matcher": {"id": "byName", "options": "Uploads (Received)"}, "properties": [{"id": "color", "value": {"fixedColor": "super-light-blue", "mode": "fixed"}}]}
            ]
          },
          "options": {
            "tooltip": {"mode": "multi", "sort": "desc"},
            "legend": {"displayMode": "table", "placement": "bottom", "calcs": ["mean", "max", "lastNotNull"]}
          }
        },
        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 26},
          "id": 103,
          "title": "Pod Detail (boostflow)",
          "type": "row"
        },
        {
          "id": 10,
          "type": "timeseries",
          "title": "CPU Usage by Pod",
          "description": "Per-pod CPU in the boostflow namespace",
          "gridPos": {"h": 9, "w": 12, "x": 0, "y": 27},
          "datasource": {"type": "prometheus", "uid": "Prometheus"},
          "targets": [{"expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"boostflow\", container!=\"POD\", container!=\"\", image!=\"\"}[5m])) by (pod)", "legendFormat": "{{pod}}", "refId": "A"}],
          "fieldConfig": {
            "defaults": {
              "custom": {"lineInterpolation": "smooth", "lineWidth": 2, "fillOpacity": 15, "gradientMode": "opacity", "showPoints": "never"},
              "unit": "short",
              "min": 0
            }
          },
          "options": {
            "tooltip": {"mode": "multi", "sort": "desc"},
            "legend": {"displayMode": "table", "placement": "bottom", "calcs": ["mean", "max", "lastNotNull"]}
          }
        },
        {
          "id": 11,
          "type": "timeseries",
          "title": "Memory Usage by Pod",
          "description": "Per-pod working set memory in the boostflow namespace",
          "gridPos": {"h": 9, "w": 12, "x": 12, "y": 27},
          "datasource": {"type": "prometheus", "uid": "Prometheus"},
          "targets": [{"expr": "sum(container_memory_working_set_bytes{namespace=\"boostflow\", container!=\"POD\", container!=\"\", image!=\"\"}) by (pod)", "legendFormat": "{{pod}}", "refId": "A"}],
          "fieldConfig": {
            "defaults": {
              "custom": {"lineInterpolation": "smooth", "lineWidth": 2, "fillOpacity": 15, "gradientMode": "opacity", "showPoints": "never"},
              "unit": "decbytes",
              "min": 0
            }
          },
          "options": {
            "tooltip": {"mode": "multi", "sort": "desc"},
            "legend": {"displayMode": "table", "placement": "bottom", "calcs": ["mean", "max", "lastNotNull"]}
          }
        },
        {
          "id": 12,
          "type": "timeseries",
          "title": "Network I/O by Pod",
          "description": "Combined inbound and outbound network throughput per pod",
          "gridPos": {"h": 9, "w": 24, "x": 0, "y": 36},
          "datasource": {"type": "prometheus", "uid": "Prometheus"},
          "targets": [
            {"expr": "sum(rate(container_network_receive_bytes_total{namespace=\"boostflow\"}[5m])) by (pod)", "legendFormat": "{{pod}} rx", "refId": "A"},
            {"expr": "sum(rate(container_network_transmit_bytes_total{namespace=\"boostflow\"}[5m])) by (pod)", "legendFormat": "{{pod}} tx", "refId": "B"}
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {"lineInterpolation": "smooth", "lineWidth": 2, "fillOpacity": 10, "gradientMode": "opacity", "showPoints": "never"},
              "unit": "Bps",
              "min": 0
            }
          },
          "options": {
            "tooltip": {"mode": "multi", "sort": "desc"},
            "legend": {"displayMode": "table", "placement": "bottom", "calcs": ["mean", "max", "lastNotNull"]}
          }
        },
        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 45},
          "id": 104,
          "title": "Log Analytics (Elasticsearch)",
          "type": "row"
        },
        {
          "id": 13,
          "type": "timeseries",
          "title": "Log Ingestion Rate by Namespace",
          "description": "Document count from the filebeat-* Elasticsearch index, split by Kubernetes namespace",
          "gridPos": {"h": 9, "w": 24, "x": 0, "y": 46},
          "datasource": {"type": "elasticsearch", "uid": "Elasticsearch"},
          "targets": [
            {
              "datasource": {"type": "elasticsearch", "uid": "Elasticsearch"},
              "query": "",
              "metrics": [{"type": "count", "id": "1"}],
              "bucketAggs": [
                {"type": "terms", "field": "kubernetes.namespace.keyword", "id": "3", "settings": {"size": "10", "order": "desc", "orderBy": "_count", "min_doc_count": "1"}},
                {"type": "date_histogram", "field": "@timestamp", "id": "2", "settings": {"interval": "auto", "min_doc_count": "0"}}
              ],
              "timeField": "@timestamp",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {"lineInterpolation": "smooth", "lineWidth": 2, "fillOpacity": 25, "gradientMode": "opacity", "stacking": {"mode": "normal", "group": "A"}, "showPoints": "never"},
              "unit": "short",
              "min": 0
            }
          },
          "options": {
            "tooltip": {"mode": "multi", "sort": "desc"},
            "legend": {"displayMode": "table", "placement": "bottom", "calcs": ["sum", "mean", "max"]}
          }
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "style": "dark",
      "tags": ["boostflow", "devsecops"],
      "templating": {"list": []},
      "time": {"from": "now-3h", "to": "now"},
      "timepicker": {
        "refresh_intervals": ["10s", "30s", "1m", "5m", "15m", "30m", "1h"]
      },
      "timezone": "browser",
      "title": "BoostFlow DevSecOps Overview",
      "uid": "boostflow-overview",
      "version": 1
    }
