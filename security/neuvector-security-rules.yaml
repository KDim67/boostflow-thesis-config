apiVersion: v1
items:
- apiVersion: neuvector.com/v1
  kind: NvSecurityRule
  metadata:
    creationTimestamp: null
    name: nv.boostflow-app.boostflow
    namespace: boostflow
  spec:
    dlp:
      settings: []
      status: true
    egress:
    - action: allow
      applications:
      - DNS
      name: nv.coredns.kube-system-egress-0
      ports: any
      priority: 0
      selector:
        comment: ""
        criteria:
        - key: service
          op: =
          value: coredns.kube-system
        - key: domain
          op: =
          value: kube-system
        name: nv.coredns.kube-system
        original_name: ""
    - action: allow
      applications:
      - HTTP
      name: nv.jaeger.monitoring-egress-1
      ports: any
      priority: 0
      selector:
        comment: ""
        criteria:
        - key: service
          op: =
          value: jaeger.monitoring
        - key: domain
          op: =
          value: monitoring
        name: nv.jaeger.monitoring
        original_name: ""
    file: []
    ingress:
    - action: allow
      applications:
      - HTTP
      name: nv.boostflow-app.boostflow-ingress-0
      ports: any
      priority: 0
      selector:
        comment: ""
        name: nodes
        original_name: ""
    - action: allow
      applications:
      - HTTP
      name: nv.boostflow-app.boostflow-ingress-1
      ports: any
      priority: 0
      selector:
        comment: ""
        criteria:
        - key: service
          op: =
          value: prometheus.monitoring
        - key: domain
          op: =
          value: monitoring
        name: nv.prometheus.monitoring
        original_name: ""
    process:
    - action: allow
      allow_update: false
      name: next-server
      path: /nodejs/bin/node
    - action: allow
      allow_update: false
      name: pause
      path: /pause
    process_profile:
      baseline: zero-drift
      mode: Protect
    target:
      policymode: Protect
      selector:
        comment: ""
        criteria:
        - key: service
          op: =
          value: boostflow-app.boostflow
        - key: domain
          op: =
          value: boostflow
        grp_band_width: 0
        grp_sess_cur: 0
        grp_sess_rate: 0
        mon_metric: false
        name: nv.boostflow-app.boostflow
        original_name: ""
    waf:
      settings: []
      status: true
