apiVersion: v1
kind: ServiceAccount
metadata:
  name: falco
  namespace: security
  labels:
    app.kubernetes.io/name: falco
    app.kubernetes.io/component: runtime-security
    app.kubernetes.io/part-of: boostflow
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: falco
  labels:
    app.kubernetes.io/name: falco
    app.kubernetes.io/component: runtime-security
    app.kubernetes.io/part-of: boostflow
rules:
  - apiGroups: [""]
    resources: ["nodes", "namespaces", "pods", "replicationcontrollers", "services", "events", "configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["daemonsets", "deployments", "replicasets", "statefulsets"]
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/healthz", "/readyz"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: falco
  labels:
    app.kubernetes.io/name: falco
    app.kubernetes.io/component: runtime-security
    app.kubernetes.io/part-of: boostflow
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: falco
subjects:
  - kind: ServiceAccount
    name: falco
    namespace: security
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: falco
  namespace: security
  labels:
    app.kubernetes.io/name: falco
    app.kubernetes.io/component: runtime-security
    app.kubernetes.io/part-of: boostflow
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: falco
      app.kubernetes.io/component: runtime-security
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: falco
        app.kubernetes.io/component: runtime-security
        app.kubernetes.io/part-of: boostflow
    spec:
      serviceAccountName: falco
      hostNetwork: true
      hostPID: true
      tolerations:
        - effect: NoSchedule
          key: node-role.kubernetes.io/control-plane
      containers:
        - name: falco
          image: falcosecurity/falco:0.43.1@sha256:9f3e058ce652ecf98aa2b4d8a41e80385b08ecb17d3153bb1d1a03a406378a31
          args:
            - /usr/bin/falco
            - -o
            - container_engines.cri.sockets[]=/host/run/containerd/containerd.sock
            - -pk
          env:
            - name: FALCO_K8S_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          securityContext:
            privileged: true
          resources:
            requests:
              cpu: 10m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: containerd-socket
              mountPath: /host/run/containerd/containerd.sock
              readOnly: true
            - name: proc
              mountPath: /host/proc
              readOnly: true
            - name: boot
              mountPath: /host/boot
              readOnly: true
            - name: lib-modules
              mountPath: /host/lib/modules
              readOnly: true
            - name: usr-src
              mountPath: /host/usr/src
              readOnly: true
            - name: etc
              mountPath: /host/etc
              readOnly: true
            - name: custom-rules
              mountPath: /etc/falco/rules.d
      volumes:
        - name: containerd-socket
          hostPath:
            path: /run/containerd/containerd.sock
        - name: proc
          hostPath:
            path: /proc
        - name: boot
          hostPath:
            path: /boot
        - name: lib-modules
          hostPath:
            path: /lib/modules
        - name: usr-src
          hostPath:
            path: /usr/src
        - name: etc
          hostPath:
            path: /etc
        - name: custom-rules
          configMap:
            name: falco-custom-rules
