apiVersion: v1
kind: ConfigMap
metadata:
  name: logstash-config
  namespace: monitoring
  labels:
    app.kubernetes.io/name: logstash
    app.kubernetes.io/component: logging
    app.kubernetes.io/part-of: boostflow
data:
  logstash.yml: |
    http.host: "0.0.0.0"
    xpack.monitoring.enabled: false
    pipeline.workers: 2
    pipeline.batch.size: 125

  pipelines.yml: |
    - pipeline.id: main
      path.config: "/usr/share/logstash/pipeline/logstash.conf"

  logstash.conf: |
    input {
      beats {
        port => 5044
      }
    }

    filter {
      if [kubernetes][namespace] == "boostflow" {
        if [kubernetes][labels][app_kubernetes_io/name] == "boostflow" {
          mutate {
            add_tag => ["boostflow-app"]
          }
          grok {
            match => {
              "message" => [
                "%{TIMESTAMP_ISO8601:timestamp} %{LOGLEVEL:level} %{GREEDYDATA:log_message}",
                "%{GREEDYDATA:log_message}"
              ]
            }
            tag_on_failure => ["_grokparsefailure_app"]
          }
        }

        if [kubernetes][labels][app_kubernetes_io/name] == "minio" {
          mutate {
            add_tag => ["minio"]
          }
        }
      }

      if [kubernetes][namespace] == "security" {
        mutate {
          add_tag => ["security"]
        }
      }

      mutate {
        remove_field => ["agent", "ecs", "host"]
      }
    }

    output {
      elasticsearch {
        hosts => ["http://elasticsearch:9200"]
        index => "filebeat-%{+YYYY.MM.dd}"
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: logstash
  namespace: monitoring
  labels:
    app.kubernetes.io/name: logstash
    app.kubernetes.io/component: logging
    app.kubernetes.io/part-of: boostflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: logstash
      app.kubernetes.io/component: logging
  template:
    metadata:
      labels:
        app.kubernetes.io/name: logstash
        app.kubernetes.io/component: logging
        app.kubernetes.io/part-of: boostflow
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: logstash
          image: docker.elastic.co/logstash/logstash:8.17.5
          ports:
            - name: beats
              containerPort: 5044
              protocol: TCP
            - name: http
              containerPort: 9600
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 768Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /usr/share/logstash/config/logstash.yml
              subPath: logstash.yml
            - name: config
              mountPath: /usr/share/logstash/config/pipelines.yml
              subPath: pipelines.yml
            - name: pipeline
              mountPath: /usr/share/logstash/pipeline/logstash.conf
              subPath: logstash.conf
            - name: data
              mountPath: /usr/share/logstash/data
      volumes:
        - name: config
          configMap:
            name: logstash-config
        - name: pipeline
          configMap:
            name: logstash-config
        - name: data
          emptyDir:
            sizeLimit: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: logstash
  namespace: monitoring
  labels:
    app.kubernetes.io/name: logstash
    app.kubernetes.io/component: logging
    app.kubernetes.io/part-of: boostflow
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: logstash
    app.kubernetes.io/component: logging
  ports:
    - name: beats
      port: 5044
      targetPort: beats
      protocol: TCP
    - name: http
      port: 9600
      targetPort: http
      protocol: TCP
