---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: boostflow-runtime-mail
  namespace: boostflow
spec:
  type: kv-v2
  mount: secret
  path: boostflow/runtime/mail
  refreshAfter: 1h
  vaultAuthRef: boostflow-auth
  destination:
    name: boostflow-mail-secret
    create: true
    overwrite: true
    transformation:
      excludeRaw: true
      excludes:
        - .*
      templates:
        MAILHOG_HOST: { text: '{{ .Secrets.mailhog_host }}' }
        MAILHOG_PORT: { text: '{{ .Secrets.mailhog_port }}' }
        DEFAULT_FROM_EMAIL: { text: '{{ .Secrets.default_from }}' }
        SENDGRID_API_KEY: { text: '{{ .Secrets.sendgrid_api_key }}' }
