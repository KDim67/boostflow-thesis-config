apiVersion: v1
kind: ServiceAccount
metadata:
  name: boostflow-vault
  namespace: boostflow
automountServiceAccountToken: false
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultConnection
metadata:
  name: boostflow-vault
  namespace: boostflow
spec:
  address: http://vault.vault.svc:8200
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: boostflow-auth
  namespace: boostflow
spec:
  vaultConnectionRef: boostflow-vault
  method: kubernetes
  mount: kubernetes
  kubernetes:
    role: boostflow-app
    serviceAccount: boostflow-vault
    audiences:
      - vault
