apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: boostflow-compliance
  namespace: argocd
spec:
  project: boostflow
  source:
    repoURL: https://github.com/KDim67/boostflow-thesis-config
    targetRevision: main
    path: compliance
  destination:
    server: https://kubernetes.default.svc
    namespace: compliance
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
