apiVersion: apps/v1
kind: Deployment
metadata:
  name: boostflow-app
  namespace: boostflow
  labels:
    app.kubernetes.io/name: boostflow
    app.kubernetes.io/component: app
    app.kubernetes.io/part-of: boostflow
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: boostflow
      app.kubernetes.io/component: app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: boostflow
        app.kubernetes.io/component: app
        app.kubernetes.io/part-of: boostflow
    spec:
      serviceAccountName: boostflow-vault
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: boostflow
          image: ghcr.io/kdim67/boostflow@sha256:5ae16851288e433cdbebad8f5a0f80effd07bac56c00a22d3c7a8f0d9f2b052a
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - secretRef:
                name: boostflow-firebase-admin-secret
            - secretRef:
                name: boostflow-firebase-public-secret
            - secretRef:
                name: boostflow-oauth-secret
            - secretRef:
                name: boostflow-gemini-secret
            - secretRef:
                name: boostflow-minio-secret
            - secretRef:
                name: boostflow-mail-secret
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://jaeger.monitoring.svc.cluster.local:4318"
            - name: OTEL_SERVICE_NAME
              value: "boostflow-app"
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 10m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: next-cache
              mountPath: /app/.next/cache
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
        - name: next-cache
          emptyDir:
            sizeLimit: 128Mi
