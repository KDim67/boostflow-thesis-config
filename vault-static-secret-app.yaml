apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: boostflow-runtime-firebase-public
  namespace: boostflow
spec:
  type: kv-v2
  mount: secret
  path: boostflow/build/firebase-public
  refreshAfter: 1h
  vaultAuthRef: boostflow-auth
  destination:
    name: boostflow-firebase-public-secret
    create: true
    overwrite: true
    transformation:
      excludeRaw: true
      excludes:
        - .*
      templates:
        NEXT_PUBLIC_FIREBASE_API_KEY: { text: '{{ .Secrets.api_key }}' }
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: { text: '{{ .Secrets.auth_domain }}' }
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: { text: '{{ .Secrets.project_id }}' }
        NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: { text: '{{ .Secrets.storage_bucket }}' }
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: { text: '{{ .Secrets.messaging_sender_id }}' }
        NEXT_PUBLIC_FIREBASE_APP_ID: { text: '{{ .Secrets.app_id }}' }
        NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: { text: '{{ .Secrets.measurement_id }}' }
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: boostflow-ci-cosign
  namespace: boostflow
spec:
  type: kv-v2
  mount: secret
  path: boostflow/ci/cosign
  refreshAfter: 1h
  vaultAuthRef: boostflow-auth
  destination:
    name: cosign-public-key-secret
    create: true
    overwrite: true
    transformation:
      excludeRaw: true
      excludes:
        - .*
      templates:
        cosign.pub:
          text: '{{ .Secrets.public_key }}'
