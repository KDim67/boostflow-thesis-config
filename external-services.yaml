apiVersion: v1
kind: Service
metadata:
  name: jenkins-external
  namespace: boostflow
  labels:
    app.kubernetes.io/name: jenkins
    app.kubernetes.io/component: cicd
    app.kubernetes.io/part-of: boostflow
spec:
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Endpoints
metadata:
  name: jenkins-external
  namespace: boostflow
  labels:
    app.kubernetes.io/name: jenkins
    app.kubernetes.io/component: cicd
    app.kubernetes.io/part-of: boostflow
subsets:
  - addresses:
      - ip: 10.0.0.4
    ports:
      - port: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: sonarqube-external
  namespace: boostflow
  labels:
    app.kubernetes.io/name: sonarqube
    app.kubernetes.io/component: code-quality
    app.kubernetes.io/part-of: boostflow
spec:
  ports:
    - port: 9000
      targetPort: 9000
---
apiVersion: v1
kind: Endpoints
metadata:
  name: sonarqube-external
  namespace: boostflow
  labels:
    app.kubernetes.io/name: sonarqube
    app.kubernetes.io/component: code-quality
    app.kubernetes.io/part-of: boostflow
subsets:
  - addresses:
      - ip: 10.0.0.4
    ports:
      - port: 9000
