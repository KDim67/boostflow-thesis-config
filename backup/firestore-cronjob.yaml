apiVersion: v1
kind: Namespace
metadata:
  name: backup
  labels:
    pod-security.kubernetes.io/enforce: restricted
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: firestore-export
  namespace: backup
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            fsGroup: 65532
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: gcloud
              image: google/cloud-sdk:489.0.0-slim
              imagePullPolicy: IfNotPresent
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              env:
                - name: GOOGLE_APPLICATION_CREDENTIALS
                  value: /var/secrets/gcp/key.json
                - name: GCP_PROJECT
                  valueFrom:
                    secretKeyRef:
                      name: firestore-backup-secret
                      key: GCP_PROJECT
                - name: BACKUP_BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: firestore-backup-secret
                      key: BACKUP_BUCKET
              command:
                - /bin/bash
                - -c
                - |
                  set -euo pipefail
                  TS=$(date -u +%Y%m%dT%H%M%SZ)
                  gcloud auth activate-service-account --key-file="$GOOGLE_APPLICATION_CREDENTIALS"
                  gcloud firestore export "gs://${BACKUP_BUCKET}/firestore-exports/${TS}" \
                    --project="${GCP_PROJECT}"
              volumeMounts:
                - name: gcp-key
                  mountPath: /var/secrets/gcp
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
                - name: gcloud-config
                  mountPath: /.config
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
          volumes:
            - name: gcp-key
              secret:
                secretName: firestore-backup-secret
                items:
                  - key: SERVICE_ACCOUNT_JSON
                    path: key.json
            - name: tmp
              emptyDir: {}
            - name: gcloud-config
              emptyDir: {}
