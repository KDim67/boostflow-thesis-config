              "editorMode": "code",
              "expr": "rate(minio_s3_traffic_sent_bytes[5m])",
              "legendFormat": "Sent (Downloads)",
              "range": true,
              "refId": "A"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "Prometheus"
              },
              "editorMode": "code",
              "expr": "rate(minio_s3_traffic_received_bytes[5m])",
              "legendFormat": "Received (Uploads)",
              "range": true,
